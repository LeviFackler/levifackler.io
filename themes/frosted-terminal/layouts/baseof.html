<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default "en" }}" class="scroll-smooth">
<head>
  {{ partial "head.html" . }}
</head>
<body class="bg-terminal-black text-white selection:bg-hacker-green selection:text-black min-h-screen bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-zinc-900 via-terminal-black to-terminal-black">
  {{ if not .IsHome }}
  <div class="fixed top-8 left-8 z-50 pointer-events-none">
    <div class="w-2.5 h-5 bg-hacker-green cursor-blink"></div>
  </div>
  {{ end }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>
  
  {{ partial "dock.html" . }}
</body>
</html>
